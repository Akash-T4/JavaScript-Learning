<!doctype html>
<html>
  <head>
    <title>DOM</title>
    <style>
      body {
        font-family: Arial;
      }

      .subscribe-button {
        background-color: black;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 30px;
      }

      .is-subscribed {
        background-color: rgb(240, 240, 240);
        color: black;
      }

      .cost-input {
        font-size: 16px;
        padding: 10px;
        margin-bottom: 30px;
      }

      .calculate-button {
        background-color: rgb(19, 150, 19);
        color: white;
        border: none;
        padding: 13px 15px;
        font-weight: bold;
        cursor: pointer;
      }

      .negative-order-cost {
        color: red;
      }

      .class-list-btn {
        background-color: rgb(240, 240, 240);
        padding: 10px 15px;
        cursor: pointer;
        margin-right: 10px;
        border-radius: 6px;
        margin-bottom: 30px;
      }

      .js-class-list-btn-is-toggled,
      .js-class-list-btn-is-toggled2 {
        background-color: black;
        color: white;
      }
    </style>
  </head>
  <body>
    <p>YouTube Subscribe Button</p>
    <button class="js-subscribe-button subscribe-button" onclick="subscribe()">
      Subscribe
    </button>

    <p>Amazon Shipping Cost Calculator</p>
    <p>Order above &#8377;500 = FREE DELIVERY</p>
    <p>Order under &#8377;500 = +&#8377;50 DELIVERY FEE</p>
    <input
      class="js-cost-input cost-input"
      placeholder="Cost of order"
      onkeydown="calculateCostKeydown(event)"
    />
    <button class="calculate-button" onclick="calculateCost()">
      Calculate
    </button>
    <p class="order-cost"></p>

    <div>
      <button
        class="class-list-btn js-class-list-btn-l"
        onclick="toggleClick('.js-class-list-btn-l')"
      >
        Learning
      </button>
      <button
        class="class-list-btn js-class-list-btn-p"
        onclick="toggleClick('.js-class-list-btn-p')"
      >
        Playing
      </button>
      <button
        class="class-list-btn js-class-list-btn-g"
        onclick="toggleClick('.js-class-list-btn-g')"
      >
        Gaming
      </button>
    </div>
    <div>
      <button
        class="class-list-btn js-class-list-btn-ll"
        onclick="toggleClick2('.js-class-list-btn-ll')"
      >
        Learning
      </button>
      <button
        class="class-list-btn js-class-list-btn-pp"
        onclick="toggleClick2('.js-class-list-btn-pp')"
      >
        Playing
      </button>
      <button
        class="class-list-btn js-class-list-btn-gg"
        onclick="toggleClick2('.js-class-list-btn-gg')"
      >
        Gaming
      </button>
    </div>

    <script>
      // document.body.innerHTML = "Hello World...";
      // document.title = "DOM Learning";\\
      function toggleClick(selector) {
        let btnElem = document.querySelector(selector);
        if (btnElem.classList.contains("js-class-list-btn-is-toggled")) {
          btnElem.classList.remove("js-class-list-btn-is-toggled");
        } else {
          btnElem.classList.add("js-class-list-btn-is-toggled");
        }
      }

      function toggleClick2(selector) {
        let btnElem = document.querySelector(selector);
        if (!btnElem.classList.contains("js-class-list-btn-is-toggled2")) {
          let otherbtnElem = document.querySelector(
            ".js-class-list-btn-is-toggled2",
          );
          if (otherbtnElem) {
            otherbtnElem.classList.remove("js-class-list-btn-is-toggled2");
          }
          btnElem.classList.add("js-class-list-btn-is-toggled2");
        } else {
          btnElem.classList.remove("js-class-list-btn-is-toggled2");
        }
      }

      function subscribe() {
        let buttonElement = document.querySelector(".js-subscribe-button");
        if (buttonElement.innerText === "Subscribe") {
          buttonElement.innerHTML = "Subscribed";
          buttonElement.classList.add("is-subscribed");
        } else {
          buttonElement.innerHTML = "Subscribe";
          buttonElement.classList.remove("is-subscribed");
        }
      }

      function calculateCost() {
        let cost = Number(document.querySelector(".js-cost-input").value);
        console.log(cost);
        if (cost <= 0) {
          document.querySelector(".order-cost").innerHTML =
            `${cost} : Cost cannot be 0 or less than 0`;
          document
            .querySelector(".order-cost")
            .classList.add("negative-order-cost");
        } else if (cost > 0 && cost < 500) {
          cost += 50;
          displayOrderCost(cost);
        } else {
          displayOrderCost(cost);
        }
      }

      function calculateCostKeydown(event) {
        // console.log(event);
        if (event.key === "Enter") {
          calculateCost();
        }
      }

      function displayOrderCost(cost) {
        document.querySelector(".order-cost").innerHTML = `&#8377;${cost}`;
        document
          .querySelector(".order-cost")
          .classList.remove("negative-order-cost");
      }
    </script>
  </body>
</html>
