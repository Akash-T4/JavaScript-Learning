<!doctype html>
<html>
  <head>
    <title>Rock Paper Scissor</title>
  </head>
  <link rel="stylesheet" href="rock-paper-scissors.css" />
  <body>
    <div class="rpc-game-container">
      <div class="rpc-game-sub-container">
        <div class="rpc-game-title-container">
          <p class="rpc-game-result-emoji"></p>
          <p class="rpc-game-title">Rock Paper Scissor</p>
          <p class="rpc-game-result-emoji"></p>
        </div>

        <div class="rpc-game-move-button-container">
          <button class="rpc-game-move-button js-rpc-game-rock-move-button">
            <img src="icons/Rock-emoji.png" class="rpc-game-move-icon" />
          </button>
          <button class="rpc-game-move-button js-rpc-game-paper-move-button">
            <img src="icons/Paper-emoji.png" class="rpc-game-move-icon" />
          </button>
          <button class="rpc-game-move-button js-rpc-game-scissor-move-button">
            <img src="icons/Scissor-emoji.png" class="rpc-game-move-icon" />
          </button>
        </div>

        <p class="js-result rpc-game-result"></p>
        <p class="js-move rpc-game-move"></p>
        <p class="js-score rpc-game-score"></p>
        <div class="rpc-game-reset-score-button-container">
          <button
            class="rpc-game-reset-score-button js-rpc-game-reset-score-button"
          >
            Reset Score
          </button>
          <button
            class="rpc-game-auto-play-button js-rpc-game-auto-play-button"
          >
            Auto Play
          </button>
        </div>
      </div>
    </div>

    <script src="rock-paper-scissors.js"></script>
  </body>
</html>
