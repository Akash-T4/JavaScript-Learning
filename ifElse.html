<!doctype html>
<html>
  <head>
    <title>Rock Paper Scissor</title>
  </head>
  <body>
    <p>Rock Paper Scissor</p>
    <button
      onclick="
        const randomNumber = Math.random();
        let computerMove = '';
        let result = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'Rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'Paper';
        } else {
          computerMove = 'Scissor';
        }

        if (computerMove === 'Rock') {
          result = 'Tie';
        } else if (computerMove === 'Paper') {
          result = 'You Lose';
        } else {
          result = 'You Win';
        }
        alert(`You Picked Rock. Computer Picked ${computerMove}. ${result}`);
      "
    >
      Rock
    </button>
    <button
      onclick="
        const randomNumber = Math.random();
        let computerMove = '';
        let result = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'Rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'Paper';
        } else {
          computerMove = 'Scissor';
        }

        if (computerMove === 'Rock') {
          result = 'You Win';
        } else if (computerMove === 'Paper') {
          result = 'Tie';
        } else {
          result = 'You Lose';
        }
        alert(`You Picked Paper. Computer Picked ${computerMove}. ${result}`);
      "
    >
      Paper
    </button>
    <button
      onclick="
        const randomNumber = Math.random();
        let computerMove = '';
        let result = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'Rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'Paper';
        } else {
          computerMove = 'Scissor';
        }

        if (computerMove === 'Rock') {
          result = 'You Lose';
        } else if (computerMove === 'Paper') {
          result = 'You Win';
        } else {
          result = 'Tie';
        }
        alert(`You Picked Scissor. Computer Picked ${computerMove}. ${result}`);
      "
    >
      Scissor
    </button>
  </body>
</html>
