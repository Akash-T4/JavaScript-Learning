<!doctype html>
<html>
  <head>
    <title>Rock Paper Scissor</title>
  </head>
  <body>
    <p>Rock Paper Scissor</p>
    <button
      onclick="
        const randomNumber = Math.random();
        let computerMove = '';
        let result = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'Rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'Paper';
        } else {
          computerMove = 'Scissor';
        }

        if (computerMove === 'Rock') {
          result = 'Tie';
        } else if (computerMove === 'Paper') {
          result = 'You Lose';
        } else {
          result = 'You Win';
        }
        alert(`You Picked Rock. Computer Picked ${computerMove}. ${result}`);
      "
    >
      Rock
    </button>
    <button
      onclick="
        const randomNumber = Math.random();
        let computerMove = '';
        let result = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'Rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'Paper';
        } else {
          computerMove = 'Scissor';
        }

        if (computerMove === 'Rock') {
          result = 'You Win';
        } else if (computerMove === 'Paper') {
          result = 'Tie';
        } else {
          result = 'You Lose';
        }
        alert(`You Picked Paper. Computer Picked ${computerMove}. ${result}`);
      "
    >
      Paper
    </button>
    <button
      onclick="
        const randomNumber = Math.random();
        let computerMove = '';
        let result = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'Rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'Paper';
        } else {
          computerMove = 'Scissor';
        }

        if (computerMove === 'Rock') {
          result = 'You Lose';
        } else if (computerMove === 'Paper') {
          result = 'You Win';
        } else {
          result = 'Tie';
        }
        alert(`You Picked Scissor. Computer Picked ${computerMove}. ${result}`);
      "
    >
      Scissor
    </button>

    <script>
      const hours = 4;

      if (hours >= 6 && hours < 12) {
        console.log("Good Morning !");
      } else if (hours >= 12 && hours < 7) {
        console.log("Good Evening !");
      } else {
        console.log("Good Night !");
      }

      const randomCoinNumber = Math.random();

      const coinFlip =
        randomCoinNumber >= 0 && randomCoinNumber < 1 / 2 ? "Heads" : "Tails";
      console.log(coinFlip);

      const myGuess = "Tails";
      const result = myGuess === coinFlip ? "You Win" : "You Lose";
      console.log(result);
    </script>
  </body>
</html>
