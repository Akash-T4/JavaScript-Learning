<!doctype html>
<html>
  <head>
    <title>Rock Paper Scissor</title>
  </head>
  <style>
    body {
      font-family: Arial;
      background-color: rgb(25, 25, 25);
    }

    .rpc-game-container {
      display: flex;
      justify-content: center;
    }

    .rpc-game-title-container {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .rpc-game-title {
      font-size: 40px;
      font-weight: bold;
      color: white;
      text-align: center;
    }

    .rpc-game-result-emoji {
      font-size: 40px;
    }

    .rpc-game-move-button-container {
      display: flex;
      justify-content: center;
    }

    .rpc-game-move-icon {
      height: 60px;
    }

    .rpc-game-move-button {
      padding: 30px;
      background-color: transparent;
      border: 3px solid white;
      border-radius: 70px;
      margin-right: 20px;
      cursor: pointer;
    }

    .rpc-game-result,
    .rpc-game-score,
    .rpc-game-move {
      font-size: 25px;
      font-weight: bold;
      color: white;
      margin-bottom: 50px;
      text-align: center;
    }

    .rpc-game-result {
      font-size: 40px;
    }

    .rpc-game-reset-score-button-container {
      display: flex;
      justify-content: center;
    }

    .rpc-game-reset-score-button {
      background-color: white;
      font-size: 15px;
      padding: 10px 15px;
      border: none;
      cursor: pointer;
    }
  </style>
  <body>
    <div class="rpc-game-container">
      <div class="rpc-game-sub-container">
        <div class="rpc-game-title-container">
          <p class="rpc-game-result-emoji"></p>
          <p class="rpc-game-title">Rock Paper Scissor</p>
          <p class="rpc-game-result-emoji"></p>
        </div>

        <div class="rpc-game-move-button-container">
          <button onclick="playGame('Rock')" class="rpc-game-move-button">
            <img src="icons/Rock-emoji.png" class="rpc-game-move-icon" />
          </button>
          <button onclick="playGame('Paper')" class="rpc-game-move-button">
            <img src="icons/Paper-emoji.png" class="rpc-game-move-icon" />
          </button>
          <button onclick="playGame('Scissor')" class="rpc-game-move-button">
            <img src="icons/Scissor-emoji.png" class="rpc-game-move-icon" />
          </button>
        </div>

        <p class="js-result rpc-game-result"></p>
        <p class="js-move rpc-game-move"></p>
        <p class="js-score rpc-game-score"></p>
        <div class="rpc-game-reset-score-button-container">
          <button onclick="resetScore()" class="rpc-game-reset-score-button">
            Reset Score
          </button>
        </div>
      </div>
    </div>

    <script>
      const score = JSON.parse(localStorage.getItem("score")) || {
        wins: 0,
        losses: 0,
        ties: 0,
      };

      let resultEmoji = "";

      displayScore();

      function playGame(playerMove) {
        const computerMove = pickComputerMove();

        let result = "";
        if (playerMove === "Rock") {
          if (computerMove === "Rock") {
            result = "Tie";
          } else if (computerMove === "Paper") {
            result = "You Lose";
          } else {
            result = "You Win";
          }
        } else if (playerMove === "Paper") {
          if (computerMove === "Rock") {
            result = "You Win";
          } else if (computerMove === "Paper") {
            result = "Tie";
          } else {
            result = "You Lose";
          }
        } else {
          if (computerMove === "Rock") {
            result = "You Lose";
          } else if (computerMove === "Paper") {
            result = "You Win";
          } else {
            result = "Tie";
          }
        }

        if (result === "You Win") {
          score.wins += 1;
          resultEmoji = "😄";
        } else if (result === "You Lose") {
          score.losses += 1;
          resultEmoji = "😢";
        } else {
          score.ties += 1;
          resultEmoji = "😐";
        }

        document.querySelectorAll(".rpc-game-result-emoji").forEach((i) => {
          i.innerHTML = resultEmoji;
        });

        localStorage.setItem("score", JSON.stringify(score));

        displayScore();

        document.querySelector(".js-result").innerHTML = result;

        document.querySelector(".js-move").innerHTML =
          `You <img src="icons/${playerMove}-emoji.png" class="rpc-game-move-icon"> - <img src="icons/${computerMove}-emoji.png" class="rpc-game-move-icon"> Computer `;

        //         alert(
        //           `You Picked ${playerMove}. Computer Picked ${computerMove}. ${result}
        // Wins: ${score.wins}. Losses: ${score.losses}. Ties: ${score.ties}`,
        //         );
        // Code Commented as the same feature is implemented using DOM
      }

      function pickComputerMove() {
        const randomNumber = Math.random();
        let computerMove = "";

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = "Rock";
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = "Paper";
        } else {
          computerMove = "Scissor";
        }

        return computerMove;
      }

      function displayScore() {
        document.querySelector(".js-score").innerHTML =
          `Wins: ${score.wins}. Losses: ${score.losses}. Ties: ${score.ties}`;
      }

      function resetScore() {
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem("score");
        displayScore();
        document.querySelector(".js-result").innerHTML = "";
        document.querySelector(".js-move").innerHTML = "";
        document.querySelectorAll(".rpc-game-result-emoji").forEach((i) => {
          i.innerHTML = "";
        });

        //         alert(`The Score is Reset
        // Wins: ${score.wins}. Losses: ${score.losses}. Ties: ${score.ties}`);
        // Code Commented as the same feature is implemented using DOM
      }
    </script>
  </body>
</html>
