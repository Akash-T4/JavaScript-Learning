<!doctype html>
<html>
  <head>
    <title>Cart Quantity</title>
  </head>
  <body>
    <p>Cart Quantity</p>

    <button onclick="console.log(`Cart Quantity: ${cartQuantity}`)">
      Show Quantity
    </button>

    <button
      onclick="
        // cartQuantity = cartQuantity + 1;
        // cartQuantity += 1;

        // if (cartQuantity !== '10') {
        //   cartQuantity++;
        // }

        cartQuantity < '10'
          ? cartQuantity++
          : alert('Cart Quantity Exceeded, Max Quantity is 10.');

        console.log(`Cart Quantity: ${cartQuantity}`);
      "
    >
      Add to Cart
    </button>

    <button
      onclick="
        // cartQuantity = cartQuantity - 1;
        // cartQuantity -= 1;

        cartQuantity > '0'
          ? cartQuantity--
          : alert('Cart Quantity cannot be Negative.');

        console.log(`Cart Quantity: ${cartQuantity}`);
      "
    >
      Remove from Cart
    </button>

    <button
      onclick="
        cartQuantity += 2;
        console.log(`Cart Quantity: ${cartQuantity}`);
      "
    >
      +2
    </button>

    <button
      onclick="
        cartQuantity += 3;
        console.log(`Cart Quantity: ${cartQuantity}`);
      "
    >
      +3
    </button>

    <button
      onclick="
        cartQuantity -= 2;
        console.log(`Cart Quantity: ${cartQuantity}`);
      "
    >
      -2
    </button>

    <button
      onclick="
        cartQuantity -= 3;
        console.log(`Cart Quantity: ${cartQuantity}`);
      "
    >
      -3
    </button>

    <button
      onclick="
        cartQuantity = 0;
        console.log('Cart was Reset');
        console.log(`Cart Quantity: ${cartQuantity}`);
      "
    >
      Reset Cart
    </button>

    <script>
      let cartQuantity = 0;
    </script>
  </body>
</html>
