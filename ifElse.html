      function tossCoin(myGuess) {
        const randomCoinNumber1 = Math.random();
        const randomCoinNumber2 = Math.random();

        const computerGuess =
          randomCoinNumber1 >= 0 && randomCoinNumber1 < 1 / 2
            ? "Heads"
            : "Tails";
        console.log(computerGuess);

        const tossResult =
          randomCoinNumber2 >= 0 && randomCoinNumber2 < 1 / 2
            ? "Heads"
            : "Tails";
        console.log(tossResult);

        const result =
          myGuess === computerGuess
            ? "Tie, ReToss"
            : myGuess === "Heads" && tossResult === "Heads"
              ? "You Win"
              : myGuess === "Tails" && tossResult === "Tails"
                ? "You Win"
                : "Computer Wins";
        console.log(result);
        alert(
          `You Picked ${myGuess}. Computer Picked ${computerGuess}. ${result}`,
        );
